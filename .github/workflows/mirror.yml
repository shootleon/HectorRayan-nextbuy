name: Mirroring

on: [push, delete]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:                                             
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            git@github.com:EpitechBachelorPromo2028/B-DAT-201-PAR-2-1-nextbuy-32.git
          ssh_private_key:                             
            ${{ secrets.SECRET }}
